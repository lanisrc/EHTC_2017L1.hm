data:
  - name: readme  # optional name
    file: README.md
    md5:  a8a7d2907a569f09154a72a1b3d35f4d # we should support different checksums: md5, sha1, etc.
  - file: LICENSE.txt
    md5:  7177765c4d9d3ba7d74281362186c926
  - file: INVENTORY.txt
    md5:  2c24827c04a81055897aef524110179c

  - fmt:  '{project_code}/group.uid{guid}.{author}.{kind}.{format}'
    db:   description.tsv
  - fmt:  '{eht_project_code}/group.uid{guid}.{author}.{eht_project_code}-processing-logs.{format}'
    db:   log.tsv
  - fmt:  '{eht_project_code}/group.uid{guid}.{author}.{track}-{alma_band}-{eht_band}-{eht_project_code}-{source}-{kind}.{format}'
    db:   data.tsv
  - fmt:  '{eht_project_code}/group.uid{guid}.{author}.metadata-{eht_product_code}.{format}'
    db:   meta.tsv

  - name: checksum # optional name
    fmt:  '{eht_project_code}/{algorithm}sums'
    db:   checksums.tsv

meta:
  # We should support different formats such as YAML and JSON.  We use JSON here because that's what CyVerse natrually support.
  # Click "Download Metadata" in "https://datacommons.cyverse.org/browse/iplant/home/shared/commons_repo/curated/EHTC_2017L1_May2022"
  - file: meta.json

remote:
  - name: origin # let's support multiple remote locations
    url: https://data.cyverse.org/dav-anon/iplant/commons/cyverse_curated/EHTC_2017L1_May2022/
